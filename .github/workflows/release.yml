name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  ci:
    uses: sgnl-actions/.github/.github/workflows/ci.yml@1780126e2605c69733f54ff7271b0cb4c8acf326 # v1.1.0

  release:
    needs: ci
    uses: sgnl-actions/.github/.github/workflows/release.yml@1780126e2605c69733f54ff7271b0cb4c8acf326 # v1.1.0
    with:
      bump: ${{ inputs.bump }}
    permissions:
      contents: write
