name: ad-move-user
description: Move a user to a new parent container/OU in Active Directory via LDAP

inputs:
  baseDN:
    type: text
    description: Base DN to search for the user (e.g., DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  samAccountName:
    type: text
    description: The user's sAMAccountName (pre-Windows 2000 logon name) to lookup
    required: true
    validation:
      min: 1
      max: 256

  newParentDN:
    type: text
    description: Target container/OU DN to move the user into (e.g., OU=DisabledUsers,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  newName:
    type: text
    description: New name for the user (without prefix like CN=). If omitted, keeps current name
    required: false

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

  address:
    type: text
    description: Optional LDAP server URL override
    required: false

outputs:
  status:
    type: text
    description: Operation result (success, halted, dry_run_completed)

  userDN:
    type: text
    description: The resolved Distinguished Name of the user

  previousDN:
    type: text
    description: Original Distinguished Name before move

  newDN:
    type: text
    description: New Distinguished Name after move

  moved:
    type: boolean
    description: Whether the user was moved

  renamed:
    type: boolean
    description: Whether the user was renamed during the move

  address:
    type: text
    description: LDAP server address used

  message:
    type: text
    description: Additional status message or error details
