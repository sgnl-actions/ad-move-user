# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: ad-move-user
description: Move a user to a new parent container/OU in Active Directory via LDAP

inputs:
  baseDN:
    type: text
    description: Base DN to search for the user (e.g., DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  samAccountName:
    type: text
    description: The user's sAMAccountName (pre-Windows 2000 logon name) to lookup
    required: true
    validation:
      min: 1
      max: 256

  newParentDN:
    type: text
    description: Target container/OU DN to move the user into (e.g., OU=DisabledUsers,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  newName:
    type: text
    description: New name for the user (without prefix like CN=). If omitted, keeps current name
    required: false

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

  address:
    type: text
    description: Optional LDAP server URL override
    required: false
    validation:
      min: 1
      max: 500

outputs:
  status:
    type: text
    description: Operation result (success, halted, dry_run_completed)

  userDN:
    type: text
    description: The resolved Distinguished Name of the user

  previousDN:
    type: text
    description: Original Distinguished Name before move

  newDN:
    type: text
    description: New Distinguished Name after move

  moved:
    type: boolean
    description: Whether the user was moved

  renamed:
    type: boolean
    description: Whether the user was renamed during the move

  baseDN:
    type: text
    description: The base DN used to search for the user

  samAccountName:
    type: text
    description: The sAMAccountName used to identify the user

  newParentDN:
    type: text
    description: The target parent container/OU DN the user was moved into

  address:
    type: text
    description: LDAP server address used

environment:
  ADDRESS:
    type: text
    description: LDAP server URL
    required: false
  TLS_SKIP_VERIFY:
    type: text
    description: Skip TLS certificate verification (set to 'true' to disable)
    required: false

secrets:
  BASIC_USERNAME:
    type: text
    description: LDAP bind username (Distinguished Name)
    required: true
  BASIC_PASSWORD:
    type: text
    description: LDAP bind password
    required: true
