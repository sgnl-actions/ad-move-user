name: ad-move-object
description: Move any Active Directory object (users, groups, OUs, computers, etc.) to a new parent container/OU via LDAP

inputs:
  objectDN:
    type: text
    description: Current Distinguished Name of the object to move (e.g., CN=John Doe,OU=Users,DC=example,DC=com)
    required: true

  newParentDN:
    type: text
    description: Target container/OU DN to move the object into (e.g., OU=DisabledUsers,DC=example,DC=com)
    required: true

  newName:
    type: text
    description: New name for the object (without prefix like CN= or OU=). If omitted, keeps current name
    required: false

  address:
    type: text
    description: Optional LDAP/LDAPS URL override (e.g., ldaps://dc.example.com:636)
    required: false

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

outputs:
  status:
    type: text
    description: Operation result (success, halted, dry_run_completed)

  previousDN:
    type: text
    description: Original Distinguished Name before move

  newDN:
    type: text
    description: New Distinguished Name after move

  moved:
    type: boolean
    description: Whether the object was moved

  renamed:
    type: boolean
    description: Whether the object was renamed during the move

  address:
    type: text
    description: LDAP server address used

  message:
    type: text
    description: Additional status message or error details
